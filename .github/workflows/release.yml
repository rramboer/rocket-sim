name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API tokens.
#
# Tag conventions:
#   v0.1.0rc1, v0.1.0a1, v0.1.0b2  → TestPyPI only (pre-release)
#   v0.1.0                          → TestPyPI *and* PyPI
#
# Requires (one-time setup, see README/CONTRIBUTING):
#   - A "pending publisher" registered on PyPI and on TestPyPI for this
#     repo + workflow filename `release.yml`, environments `pypi` /
#     `testpypi`.
#   - GitHub environments named `pypi` and `testpypi` on this repo.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check distributions
        run: |
          python -m pip install twine
          twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  classify:
    name: Classify tag
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.check.outputs.prerelease }}
    steps:
      - id: check
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ (a|b|rc)[0-9]*$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${GITHUB_REF_NAME} is a pre-release → TestPyPI only"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${GITHUB_REF_NAME} is a final release → TestPyPI + PyPI"
          fi

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build, classify]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/rocket-sim/
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: [build, classify, publish-testpypi]
    if: needs.classify.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/rocket-sim/
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
